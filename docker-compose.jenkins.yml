version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Jenkins compose override — Jenkins on the same Docker network as VersionIQ
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.jenkins.yml up -d
#
# Jenkins UI:
#   http://localhost:8080
# ─────────────────────────────────────────────────────────────────────────────

services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins

    container_name: version-vault-jenkins

    restart: unless-stopped

    # Run as root to allow access to the Docker socket
    user: root

    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
      # Information for internal scripts
      JENKINS_NETWORK_MODE: shared-compose-network

    ports:
      - "8080:8080"
      - "50000:50000"

    volumes:
      # Persist Jenkins data
      - jenkins_home:/var/jenkins_home

      # Docker socket access for Docker-out-of-Docker (DooD)
      - /var/run/docker.sock:/var/run/docker.sock

      # Mount project workspace
      - .:/workspace

    working_dir: /workspace

    networks:
      - version-vault-network

    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  jenkins_home:

networks:
  version-vault-network:
    # We don't mark as external here because it's defined in the base
    # docker-compose.yml and they are typically run together.
