```yaml
# ─────────────────────────────────────────────────────────────────────────────
# Jenkins compose override — Case C: Jenkins on the same Docker network
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.jenkins.yml up -d
#
# Jenkins UI:
#   http://localhost:8080
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins

    container_name: version-vault-jenkins

    restart: unless-stopped

    user: root

    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
      JENKINS_NETWORK_MODE: shared-compose-network

    ports:
      - "8080:8080"
      - "50000:50000"

    volumes:
      # Persist Jenkins data
      - jenkins_home:/var/jenkins_home

      # Docker socket access
      - /var/run/docker.sock:/var/run/docker.sock

      # Mount project workspace
      - .:/workspace

    working_dir: /workspace

    networks:
      - version-vault-network

    depends_on:
      - mongodb

volumes:
  jenkins_home:

networks:
  version-vault-network:
    external: true
```
